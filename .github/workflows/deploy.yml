name: Deploy PWA to GitHub Pages

# Builds and deploys the static PWA on every push to main.
# Before deploying, it stamps the current commit SHA into the service
# worker's CACHE_VERSION so installed users automatically pick up the new
# version. Offline support is unchanged — the SW still precaches the whole
# app shell and serves it cache-first.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one deploy at a time; don't cancel an in-progress run.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Stamp service worker cache version
        run: |
          VERSION="emi-${GITHUB_SHA::7}"
          sed -i "s|const CACHE_VERSION = '[^']*';|const CACHE_VERSION = '${VERSION}';|" sw.js
          echo "Stamped CACHE_VERSION = ${VERSION}"
          grep -n "CACHE_VERSION =" sw.js | head -1

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
